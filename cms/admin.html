<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>이수한의원 — 건강 저널 관리</title>
<style>
  :root {
    --ink-900: #14110e;
    --ink-700: #3a342d;
    --ink-500: #8a8377;
    --ink-300: #c8c1b3;
    --ink-200: #e3ddcf;
    --ink-100: #efeadd;
    --ink-50:  #f7f3e9;
    --herb:    #4a6b3a;
    --herb-dim:#6b8a5a;
    --bg:      #fbf8f0;
    --danger:  #b3382c;
    --ring:    rgba(74,107,58,0.18);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Pretendard", "Apple SD Gothic Neo",
                 "Helvetica Neue", Arial, sans-serif;
    background: var(--bg);
    color: var(--ink-900);
    font-size: 15px;
    line-height: 1.55;
    -webkit-font-smoothing: antialiased;
  }
  .wrap { max-width: 1100px; margin: 0 auto; padding: 24px 24px 120px; }

  header.top {
    position: sticky; top: 0; z-index: 30;
    backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    background: rgba(251,248,240,0.85);
    display: flex; align-items: center; justify-content: space-between;
    border-bottom: 1px solid var(--ink-200); padding: 14px 0; margin: -24px -24px 22px;
    padding-left: 24px; padding-right: 24px;
  }
  .brand { font-weight: 700; letter-spacing: -0.01em; font-size: 17px; display: flex; align-items: center; gap: 10px; }
  .brand .leaf { width: 26px; height: 26px; border-radius: 50%; background: var(--herb);
    color: white; display: inline-flex; align-items: center; justify-content: center;
    font-size: 14px; font-weight: 700; }
  .brand small { font-weight: 400; color: var(--ink-500); margin-left: 4px; font-size: 12.5px; }
  .muted { color: var(--ink-500); font-size: 13px; }
  .top-actions { display: flex; gap: 6px; align-items: center; }
  .top-actions .dot { width: 8px; height: 8px; border-radius: 50%;
    background: var(--ink-300); display: inline-block; margin-right: 6px;
    transition: background 0.2s; }
  .dot.online { background: var(--herb); }
  .dot.error { background: var(--danger); }
  .dot.busy { background: #d39c0a; animation: pulse 1.2s infinite; }
  @keyframes pulse { 50% { opacity: 0.4; } }

  /* buttons */
  button, .btn {
    appearance: none; border: 1px solid var(--ink-200); background: white;
    color: var(--ink-900); padding: 9px 16px; border-radius: 10px;
    font: inherit; cursor: pointer; transition: all 0.15s ease;
    box-shadow: 0 1px 2px rgba(20,17,14,0.04);
  }
  button:hover, .btn:hover { border-color: var(--ink-300); transform: translateY(-1px);
    box-shadow: 0 3px 8px rgba(20,17,14,0.06); }
  button:active { transform: translateY(0); }
  button.primary { background: var(--ink-900); color: white; border-color: var(--ink-900); }
  button.primary:hover { background: #000; }
  button.herb { background: var(--herb); color: white; border-color: var(--herb); }
  button.herb:hover { background: var(--herb-dim); border-color: var(--herb-dim); }
  button.danger { color: var(--danger); border-color: rgba(179,56,44,0.25); }
  button.danger:hover { background: rgba(179,56,44,0.06); border-color: rgba(179,56,44,0.4); }
  button.ghost { background: transparent; box-shadow: none; border-color: transparent; }
  button.tiny { padding: 4px 9px; font-size: 12.5px; border-radius: 7px; }
  button:disabled { opacity: 0.5; cursor: not-allowed; }

  /* input */
  input[type="text"], input[type="date"], input[type="password"], input[type="url"],
  select, textarea {
    font: inherit; color: var(--ink-900); background: white;
    border: 1px solid var(--ink-200); border-radius: 10px;
    padding: 10px 13px; outline: none; width: 100%;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  input:focus, select:focus, textarea:focus {
    border-color: var(--herb); box-shadow: 0 0 0 4px var(--ring);
  }
  textarea { resize: vertical; }

  /* toolbar */
  .toolbar {
    display: flex; gap: 10px; flex-wrap: wrap; align-items: center;
    margin-bottom: 18px;
  }
  .toolbar input[type="text"], .toolbar select { width: auto; flex: 0 1 auto; min-width: 200px; }
  .toolbar .grow { flex: 1; min-width: 200px; }

  /* list */
  .list { background: white; border: 1px solid var(--ink-200); border-radius: 14px;
    box-shadow: 0 1px 3px rgba(20,17,14,0.03); overflow: hidden; }
  .row {
    display: grid; grid-template-columns: 72px 1fr 150px 110px 140px;
    gap: 14px; padding: 14px 18px; border-top: 1px solid var(--ink-100);
    align-items: center; transition: background 0.15s;
  }
  .row:not(.head):hover { background: var(--ink-50); cursor: default; }
  .row.head { border-top: none; background: var(--ink-50); font-size: 12px;
    text-transform: uppercase; letter-spacing: 0.08em; color: var(--ink-500);
    font-weight: 600; padding: 12px 18px; }
  .row .thumb { width: 64px; height: 64px; border-radius: 8px; background: var(--ink-100);
    overflow: hidden; display: flex; align-items: center; justify-content: center; }
  .row .thumb img { width: 100%; height: 100%; object-fit: cover; }
  .row .thumb .ph { color: var(--ink-300); font-size: 22px; font-weight: 700; font-family: serif; }
  .row .title { font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    font-size: 14.5px; }
  .row .pill {
    display: inline-block; vertical-align: middle; margin-right: 8px;
    background: var(--herb); color: white; font-size: 10.5px;
    letter-spacing: 0.06em; padding: 2px 7px; border-radius: 999px; font-weight: 600;
  }
  .row .actions { display: flex; gap: 6px; justify-content: flex-end; }
  .row .actions button { padding: 6px 12px; font-size: 12.5px; }
  .badge { font-size: 11.5px; padding: 3px 9px; border-radius: 999px;
    background: var(--ink-100); color: var(--ink-700); font-weight: 500; }
  .date { color: var(--ink-500); font-size: 13px; font-variant-numeric: tabular-nums; }
  .empty { padding: 80px 20px; text-align: center; color: var(--ink-500); }
  .empty h4 { font-size: 17px; color: var(--ink-700); margin: 0 0 8px; }
  .skeleton-row { padding: 14px 18px; border-top: 1px solid var(--ink-100); }
  .skeleton-bar { height: 14px; background: linear-gradient(90deg, var(--ink-100), var(--ink-50), var(--ink-100));
    background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: 4px; }
  @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

  .pager { display: flex; gap: 8px; align-items: center; justify-content: center;
    margin-top: 18px; color: var(--ink-500); font-size: 13.5px; }
  .pager button { padding: 6px 12px; font-size: 13px; }

  /* editor */
  .editor-bar {
    position: sticky; top: 56px; z-index: 20;
    background: white; border: 1px solid var(--ink-200); border-radius: 14px;
    padding: 12px 16px; margin-bottom: 18px;
    display: flex; align-items: center; justify-content: space-between; gap: 12px;
    box-shadow: 0 4px 14px rgba(20,17,14,0.06);
  }
  .editor-bar-left { display: flex; align-items: center; gap: 10px; min-width: 0; flex: 1; }
  .editor-bar-left .meta { color: var(--ink-500); font-size: 13px; overflow: hidden;
    text-overflow: ellipsis; white-space: nowrap; }
  .editor-bar-right { display: flex; gap: 8px; align-items: center; flex-shrink: 0; }
  .save-indicator { font-size: 12.5px; color: var(--ink-500); margin-right: 6px; }
  .save-indicator.saved { color: var(--herb); }

  .editor-shell { background: white; border: 1px solid var(--ink-200); border-radius: 14px;
    padding: 28px; box-shadow: 0 1px 3px rgba(20,17,14,0.03); }
  .editor-meta { display: grid; grid-template-columns: 1fr 220px 180px;
    gap: 14px; margin-bottom: 18px; }
  .field-label { display: block; font-size: 12px; text-transform: uppercase;
    letter-spacing: 0.08em; color: var(--ink-500); font-weight: 600; margin-bottom: 6px; }
  #f-title { font-size: 18px; font-weight: 600; padding: 12px 14px; }

  /* 일체형 본문 에디터 */
  .rich-toolbar {
    position: sticky; top: 130px; z-index: 10;
    margin-top: 14px; display: flex; gap: 4px; flex-wrap: wrap; align-items: center;
    padding: 8px 10px; background: white;
    border: 1px solid var(--ink-200); border-radius: 12px 12px 0 0; border-bottom: none;
    box-shadow: 0 2px 6px rgba(20,17,14,0.04);
  }
  .rich-toolbar button {
    padding: 6px 10px; font-size: 13px; box-shadow: none;
    border: 1px solid transparent; background: transparent;
  }
  .rich-toolbar button:hover { background: var(--ink-100); border-color: var(--ink-200); transform: none; box-shadow: none; }
  .rich-toolbar .rt-sep { width: 1px; height: 20px; background: var(--ink-200); margin: 0 6px; }

  .rich-editor {
    background: white;
    border: 1px solid var(--ink-200);
    border-radius: 0 0 12px 12px;
    padding: 28px 36px 60px;
    min-height: 520px;
    font-size: 16px; line-height: 1.75; color: var(--ink-900);
    outline: none;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  .rich-editor:focus { border-color: var(--herb); box-shadow: 0 0 0 3px var(--ring); }
  .rich-editor p { margin: 0 0 14px; }
  .rich-editor h2 { font-size: 22px; font-weight: 700; margin: 28px 0 14px;
    letter-spacing: -0.01em; color: var(--ink-900); }
  .rich-editor h3 { font-size: 18px; font-weight: 700; margin: 22px 0 12px; }
  .rich-editor blockquote {
    margin: 18px 0; padding: 12px 18px; border-left: 3px solid var(--herb);
    color: var(--ink-700); background: var(--ink-50); border-radius: 0 8px 8px 0;
  }
  .rich-editor figure { margin: 22px 0; text-align: center; position: relative; display: block; }
  .rich-editor figure img { max-width: 100%; height: auto; border-radius: 10px;
    box-shadow: 0 2px 12px rgba(20,17,14,0.08); }
  .rich-editor figure.selected img,
  .rich-editor figure.selected iframe { outline: 3px solid var(--herb); outline-offset: 2px; }
  .rich-editor figure.cms-video { aspect-ratio: 16/9; max-width: 720px; margin: 22px auto; }
  .rich-editor figure.cms-video iframe { width: 100%; height: 100%; border: 0; border-radius: 10px; }
  .rich-editor figcaption {
    margin-top: 8px; font-size: 13.5px; color: var(--ink-500); font-style: italic;
  }
  .rich-editor hr {
    border: 0; border-top: 1px solid var(--ink-200); margin: 32px 0;
  }
  .rich-editor img { max-width: 100%; height: auto; }

  /* 이미지 위에 떠 있는 변경/삭제 버튼 */
  #img-overlay {
    position: absolute; display: none; gap: 6px; z-index: 50;
    background: var(--ink-900); padding: 6px; border-radius: 10px;
    box-shadow: 0 6px 20px rgba(20,17,14,0.25);
  }
  #img-overlay.show { display: flex; }
  #img-overlay button {
    background: transparent; border: none; box-shadow: none;
    color: white; font-size: 13px; padding: 4px 10px; border-radius: 6px;
  }
  #img-overlay button:hover { background: rgba(255,255,255,0.15); transform: none; box-shadow: none; }
  #img-overlay button.danger { color: #ff9f9b; }

  .editor-actions {
    display: flex; gap: 10px; justify-content: space-between; align-items: center;
    border-top: 1px solid var(--ink-200); padding-top: 18px; margin-top: 22px;
  }
  .editor-actions .right { display: flex; gap: 10px; }

  /* modal */
  .modal-bg {
    position: fixed; inset: 0; background: rgba(20,17,14,0.4);
    display: none; align-items: center; justify-content: center; z-index: 50;
    padding: 24px;
  }
  .modal-bg.open { display: flex; }
  .modal {
    background: white; border-radius: 14px; padding: 26px;
    max-width: 480px; width: 100%; box-shadow: 0 12px 48px rgba(20,17,14,0.18);
  }
  .modal h3 { margin: 0 0 16px; font-size: 17px; }
  .modal .row-cat {
    display: flex; gap: 8px; align-items: center; padding: 8px 10px;
    border: 1px solid var(--ink-100); border-radius: 8px; margin-bottom: 6px;
    background: var(--ink-50);
  }
  .modal .row-cat .name { flex: 1; }
  .modal .add-row { display: flex; gap: 8px; margin-top: 10px; }
  .modal .add-row input { flex: 1; }
  .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 18px; }

  /* toast */
  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    background: var(--ink-900); color: white; padding: 10px 18px;
    border-radius: 999px; font-size: 14px; opacity: 0; pointer-events: none;
    transition: opacity 0.2s, transform 0.2s; z-index: 100;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(-4px); }
  .toast.error { background: var(--danger); }

  /* publish progress */
  .progress {
    position: fixed; bottom: 22px; right: 22px; background: white;
    border: 1px solid var(--ink-200); border-radius: 12px; padding: 16px 18px;
    box-shadow: 0 10px 30px rgba(20,17,14,0.12); display: none; z-index: 80;
    min-width: 280px;
  }
  .progress.open { display: block; }
  .progress .title { font-weight: 600; margin-bottom: 6px; }
  .progress .step { color: var(--ink-500); font-size: 13px; }
  .progress .bar { height: 4px; background: var(--ink-100); border-radius: 999px; margin-top: 10px; overflow: hidden; }
  .progress .bar > div { height: 100%; background: var(--herb); width: 10%;
    transition: width 0.4s; border-radius: 999px; }

  .hidden { display: none !important; }

  @media (max-width: 720px) {
    .wrap { padding: 16px 14px 100px; }
    header.top { margin: -16px -14px 16px; padding-left: 14px; padding-right: 14px; }
    .brand { font-size: 15px; }
    .brand small { display: none; }
    .top-actions button { padding: 7px 10px; font-size: 13px; }
    .row { grid-template-columns: 56px 1fr 90px; gap: 10px; padding: 12px 14px; }
    .row .badge, .row .date { display: none; }
    .row .head-only { display: none; }
    .editor-meta { grid-template-columns: 1fr; }
    .editor-bar { flex-direction: column; align-items: stretch; gap: 10px; padding: 12px; }
    .editor-bar-right { justify-content: flex-end; }
    .editor-shell { padding: 20px; }
    .rich-editor { padding: 22px 22px 50px; }
    .rich-toolbar { top: 200px; }
  }
</style>
</head>
<body>
<div class="wrap">
  <header class="top">
    <div class="brand">
      <span class="leaf">醫</span>
      건강 저널 관리 <small>이수한의원</small>
    </div>
    <div class="top-actions">
      <span class="muted" id="status"><span class="dot" id="dot"></span><span id="status-text">연결 중…</span></span>
      <button class="ghost" id="btn-cats">카테고리</button>
      <button class="ghost" id="btn-settings">설정</button>
    </div>
  </header>

  <!-- 목록 뷰 -->
  <section id="view-list">
    <div class="toolbar">
      <input type="text" id="q" class="grow" placeholder="제목 검색" />
      <select id="cat-filter"><option value="">모든 카테고리</option></select>
      <button class="primary" id="btn-new">+ 새 글 작성</button>
    </div>
    <div class="list">
      <div class="row head">
        <div></div>
        <div>제목</div>
        <div class="head-only">카테고리</div>
        <div class="head-only">발행일</div>
        <div style="text-align:right">작업</div>
      </div>
      <div id="rows"></div>
    </div>
    <div class="pager">
      <button id="prev">← 이전</button>
      <span id="page-info"></span>
      <button id="next">다음 →</button>
    </div>
  </section>

  <!-- 에디터 뷰 -->
  <section id="view-editor" class="hidden">
    <div class="editor-bar">
      <div class="editor-bar-left">
        <button id="btn-back" class="ghost">← 목록</button>
        <span class="meta" id="editor-meta"></span>
      </div>
      <div class="editor-bar-right">
        <span class="save-indicator" id="save-indicator"></span>
        <button class="danger" id="btn-delete" style="display:none">삭제</button>
        <button id="btn-save">저장</button>
        <button class="herb" id="btn-publish">발행</button>
      </div>
    </div>
    <div class="editor-shell">
      <div>
        <span class="field-label">제목</span>
        <input type="text" id="f-title" placeholder="예: 환절기 면역력 관리" />
      </div>
      <div class="editor-meta" style="margin-top:14px">
        <div>
          <span class="field-label">카테고리</span>
          <select id="f-category"></select>
        </div>
        <div>
          <span class="field-label">발행일</span>
          <input type="date" id="f-date" />
        </div>
        <div>
          <span class="field-label">요약 (선택)</span>
          <input type="text" id="f-excerpt" placeholder="목록 카드 1~2줄" />
        </div>
      </div>

      <div class="rich-toolbar" id="rich-toolbar">
        <button type="button" data-rt="bold" title="굵게"><b>B</b></button>
        <button type="button" data-rt="heading" title="소제목">H</button>
        <button type="button" data-rt="quote" title="인용">❝</button>
        <span class="rt-sep"></span>
        <button type="button" data-rt="image">📷 사진</button>
        <button type="button" data-rt="video">🎬 영상</button>
        <button type="button" data-rt="hr">— 구분선</button>
      </div>
      <div id="rich-editor" class="rich-editor" contenteditable="true" spellcheck="false"></div>

      <div class="editor-actions">
        <button id="btn-cancel" class="ghost">취소하고 목록으로</button>
        <span class="muted" style="font-size:12.5px">
          <b>저장</b>: 임시 저장 (사이트 미반영) ·
          <b>발행</b>: 즉시 사이트에 올림
        </span>
      </div>
    </div>
    <div id="img-overlay">
      <button data-img-act="replace">변경</button>
      <button data-img-act="caption">설명 추가</button>
      <button class="danger" data-img-act="delete">삭제</button>
    </div>
  </section>
</div>

<!-- 카테고리 모달 -->
<div class="modal-bg" id="modal-cats">
  <div class="modal">
    <h3>카테고리 관리</h3>
    <div id="cats-list"></div>
    <div class="add-row">
      <input type="text" id="new-cat" placeholder="새 카테고리 이름" />
      <button class="primary" id="btn-add-cat">추가</button>
    </div>
    <div class="modal-actions">
      <button id="btn-cats-close">닫기</button>
      <button class="herb" id="btn-cats-save">저장</button>
    </div>
  </div>
</div>

<!-- 설정 모달 -->
<div class="modal-bg" id="modal-settings">
  <div class="modal">
    <h3 id="settings-title">관리자 로그인</h3>
    <p id="settings-help" style="color:var(--ink-500);font-size:13.5px;line-height:1.55;margin:-6px 0 16px 0;">
      이 브라우저에서 처음 사용하시는 경우 한 번만 비밀번호를 입력하면,<br/>
      다음부터는 묻지 않고 바로 글을 작성·관리할 수 있습니다.
    </p>
    <div style="margin-bottom:12px">
      <span class="field-label">비밀번호</span>
      <input type="password" id="s-pass" placeholder="병원 관리자에게 받은 비밀번호" autofocus />
    </div>
    <details id="advanced-settings" style="margin-bottom:6px">
      <summary style="cursor:pointer;color:var(--ink-500);font-size:13px;user-select:none;">고급 설정</summary>
      <div style="margin-top:12px">
        <span class="field-label">사용자명</span>
        <input type="text" id="s-user" />
      </div>
      <div style="margin-top:10px">
        <span class="field-label">CMS API URL</span>
        <input type="url" id="s-url" placeholder="https://...lambda-url..." />
      </div>
    </details>
    <div class="modal-actions">
      <button id="btn-settings-close">취소</button>
      <button class="herb" id="btn-settings-save">로그인</button>
    </div>
  </div>
</div>

<!-- 빌드 진행 -->
<div class="progress" id="progress">
  <div class="title" id="prog-title">발행 중…</div>
  <div class="step" id="prog-step">CodeBuild 호출</div>
  <div class="bar"><div id="prog-bar"></div></div>
</div>

<div id="toast" class="toast"></div>

<script>
// ── 환경 / 상태 ──────────────────────────────────────────────────────────────
const DEFAULT_API = "https://ipxrzgwgf6xzwo3qa2ynpet4hm0bmexl.lambda-url.ap-northeast-2.on.aws";
// 직원 편의를 위해 비밀번호를 admin.html에 기본 내장 — /admin/ 페이지를 보호하려면
// CloudFront Function으로 /admin/* 경로에 Basic Auth를 추가하는 것을 권장.
const DEFAULT_PASS = "ac3ddd27da8987fb6e048133c34618a9";
const cfg = {
  url: localStorage.getItem("cms_url") || DEFAULT_API,
  user: localStorage.getItem("cms_user") || "admin",
  pass: localStorage.getItem("cms_pass") || DEFAULT_PASS,
};
const PAGE_SIZE = 20;
const state = {
  posts: [], categories: [], q: "", cat: "", page: 0,
  editing: null,    // {logNo} or null
  bodyHtml: "",     // 편집 중인 본문 HTML
};

const $ = (s) => document.querySelector(s);
const uuid = () => Math.random().toString(36).slice(2, 10);

function authHeader() {
  return "Basic " + btoa(`${cfg.user}:${cfg.pass}`);
}
function toast(msg, kind = "ok") {
  const t = $("#toast");
  t.textContent = msg;
  t.className = "toast show" + (kind === "error" ? " error" : "");
  setTimeout(() => (t.className = "toast"), 2400);
}
async function api(path, opts = {}) {
  const r = await fetch(cfg.url + path, {
    headers: { "content-type": "application/json", "authorization": authHeader() },
    ...opts,
  });
  if (!r.ok) {
    const err = await r.json().catch(() => ({ error: r.statusText }));
    const e = new Error(err.error || "요청 실패"); e.status = r.status; throw e;
  }
  return r.json();
}
async function apiPublic(path) {
  const r = await fetch(cfg.url + path);
  if (!r.ok) throw new Error("요청 실패");
  return r.json();
}
function setStatus(kind, text) {
  const dot = $("#dot"), st = $("#status-text");
  dot.className = "dot" + (kind === "ok" ? " online" : kind === "error" ? " error" : "");
  st.textContent = text;
}
function isoToday() {
  const d = new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
}
function isoToAddDate(iso) {
  const m = String(iso).match(/^(\d{4})-(\d{1,2})-(\d{1,2})/);
  return m ? `${m[1]}. ${parseInt(m[2],10)}. ${parseInt(m[3],10)}.` : "";
}
function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, (c) => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
}

// ── 부트 ─────────────────────────────────────────────────────────────────────
async function boot() {
  if (!cfg.pass) { openSettings(true); return; }
  setStatus("", "확인 중…");
  try {
    await apiPublic("/");
    const cats = await apiPublic("/api/categories");
    state.categories = cats.categories || [];
    fillCategoryUI();
    await loadPosts();
    setStatus("ok", "연결됨");
  } catch (e) {
    setStatus("error", "연결 실패: " + e.message);
    toast(e.message, "error");
  }
}

async function loadPosts() {
  // 첫 로드 — 스켈레톤 표시
  if (state.posts.length === 0) {
    const rows = $("#rows");
    rows.innerHTML = Array.from({length: 6}).map(() => `
      <div class="skeleton-row">
        <div class="skeleton-bar" style="width:60%"></div>
        <div class="skeleton-bar" style="width:30%; margin-top:8px; height:10px"></div>
      </div>`).join("");
  }
  setStatus("busy", "불러오는 중…");
  const data = await api("/api/posts");
  state.posts = data.posts || [];
  setStatus("ok", `총 ${state.posts.length}개`);
  renderList();
}

// ── 목록 ─────────────────────────────────────────────────────────────────────
function fillCategoryUI(extraCat = null) {
  // 현재 글의 카테고리가 사용자 정의 목록에 없는 경우(예: 레거시 BLOG/기타),
  // 임시 옵션으로 함께 표시해 사용자가 다른 값으로 바꿀 수 있게 한다.
  const cats = state.categories.slice();
  if (extraCat && extraCat !== "" && !cats.includes(extraCat)) cats.push(extraCat);
  const opts = ['<option value="">모든 카테고리</option>'].concat(
    cats.map((c) => `<option value="${escapeHtml(c)}">${escapeHtml(c)}</option>`)
  ).join("");
  $("#cat-filter").innerHTML = opts;
  $("#f-category").innerHTML = cats
    .map((c) => `<option value="${escapeHtml(c)}">${escapeHtml(c)}</option>`).join("");
}

function filtered() {
  const q = state.q.trim().toLowerCase();
  return state.posts.filter((p) => {
    if (q && !p.title.toLowerCase().includes(q)) return false;
    if (state.cat && p.category !== state.cat) return false;
    return true;
  });
}

function renderList() {
  const list = filtered();
  const total = list.length;
  const pages = Math.max(1, Math.ceil(total / PAGE_SIZE));
  if (state.page >= pages) state.page = pages - 1;
  const start = state.page * PAGE_SIZE;
  const slice = list.slice(start, start + PAGE_SIZE);
  const rows = $("#rows");
  if (slice.length === 0) {
    if (state.q || state.cat) {
      rows.innerHTML = `<div class="empty"><h4>검색 결과 없음</h4><div>"${escapeHtml(state.q || state.cat)}"에 해당하는 글이 없습니다. 검색어/필터를 다시 확인해 주세요.</div></div>`;
    } else {
      rows.innerHTML = `<div class="empty"><h4>아직 작성된 글이 없습니다</h4><div>우측 상단 [+ 새 글 작성]을 눌러 시작하세요.</div></div>`;
    }
  } else {
    rows.innerHTML = slice.map((p) => {
      const thumb = p.thumbnail
        ? `<img src="${escapeHtml(p.thumbnail)}" alt="" />`
        : `<span class="ph">醫</span>`;
      return `
        <div class="row" data-logno="${p.logNo}">
          <div class="thumb">${thumb}</div>
          <div class="title">${escapeHtml(p.title)}</div>
          <div><span class="badge">${escapeHtml(p.category || "기타")}</span></div>
          <div class="date">${escapeHtml(p.addDate || "")}</div>
          <div class="actions">
            <button data-act="edit">수정</button>
            <button class="danger" data-act="delete">삭제</button>
          </div>
        </div>`;
    }).join("");
  }
  $("#page-info").textContent = `${state.page + 1} / ${pages} · ${total}개`;
  $("#prev").disabled = state.page === 0;
  $("#next").disabled = state.page >= pages - 1;
}

// ── 에디터 ────────────────────────────────────────────────────────────────
function showList() {
  $("#view-list").classList.remove("hidden");
  $("#view-editor").classList.add("hidden");
  state.editing = null;
  state.bodyHtml = "";
}
async function showEditor(post = null) {
  // 카테고리가 아직 안 들어왔다면 먼저 받아온다 (레이스 방지)
  if (state.categories.length === 0) {
    try {
      const cats = await apiPublic("/api/categories");
      state.categories = cats.categories || [];
    } catch (e) {
      toast("카테고리를 불러오지 못했습니다. 우측 상단 [설정]을 확인하세요", "error");
      return;
    }
    if (state.categories.length === 0) {
      toast("등록된 카테고리가 없습니다. [카테고리]에서 먼저 추가하세요", "error");
      return;
    }
  }

  $("#view-list").classList.add("hidden");
  $("#view-editor").classList.remove("hidden");

  state.editing = post ? { logNo: post.logNo } : null;
  // 본문은 항상 사이트 표시 HTML 그대로. 일체형 contentEditable로 한 흐름에 편집.
  state.bodyHtml = cleanForEditor(post?.body || "<p><br></p>");

  // 카테고리 — 기존 글의 카테고리가 현재 목록에 없으면 그래도 보여주기 위해 임시 옵션 추가
  const wantCat = post?.meta?.category || state.categories[0] || "한의원 story";
  fillCategoryUI(wantCat);

  $("#f-title").value = post?.title || "";
  $("#f-date").value = post?.meta?.date || isoToday();
  $("#f-category").value = wantCat;
  $("#f-excerpt").value = post?.meta?.ogDesc || "";
  $("#editor-meta").textContent = post ? `수정 · ${post.logNo}` : "새 글 작성";
  $("#btn-delete").style.display = post ? "" : "none";
  $("#rich-editor").innerHTML = state.bodyHtml;
  setSaveIndicator(post ? "" : "");
  $("#f-title").focus();
}

// 본문/제목 변경 감지 → 저장 안 된 표시
function onEditorDirty() { setSaveIndicator("변경됨 (저장 필요)", ""); }
document.addEventListener("DOMContentLoaded", () => {
  ["f-title","f-date","f-category","f-excerpt"].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.addEventListener("input", onEditorDirty);
  });
  const re = document.getElementById("rich-editor");
  if (re) re.addEventListener("input", onEditorDirty);
});

// ── 본문 HTML 정리 (불러오기 / 저장) ───────────────────────────────────────
// 네이버 placeholder/lazy-src 패턴을 실제 src로 정규화하고 안전 필터 적용
function cleanForEditor(html) {
  if (!html) return "<p><br></p>";
  let out = html;
  // 네이버 lazy-load: <img src="?type=w80_blur" data-lazy-src="원본"> → src=원본
  out = out.replace(/<img\b([^>]*?)\sdata-lazy-src="([^"]+)"([^>]*)>/gi, (_m, before, real, after) => {
    const merged = (before + " " + after).replace(/\ssrc="[^"]*"/i, "");
    return `<img${merged} src="${real}">`;
  });
  // pstatic.net 이미지 ?type 정규화
  out = out.replace(
    /(<img[^>]+src="https:\/\/[^"]*?\.pstatic\.net\/[^"?]+)(\?type=[^"]*)?"/g,
    '$1?type=w966"',
  );
  // 안전: script/style/onclick 류 제거
  out = out.replace(/<script[\s\S]*?<\/script>/gi, "");
  out = out.replace(/<style[\s\S]*?<\/style>/gi, "");
  out = out.replace(/\son\w+="[^"]*"/gi, "");
  out = out.replace(/\son\w+='[^']*'/gi, "");
  // 네이버 SmartEditor의 빈 placeholder 제거
  out = out.replace(/<img[^>]+src="[^"]*\?type=w(?:2|80_blur)[^"]*"[^>]*>/gi, "");
  return out;
}

function cleanForSave(html) {
  if (!html) return "";
  let out = html;
  out = out.replace(/<script[\s\S]*?<\/script>/gi, "");
  out = out.replace(/<style[\s\S]*?<\/style>/gi, "");
  out = out.replace(/\son\w+="[^"]*"/gi, "");
  out = out.replace(/\son\w+='[^']*'/gi, "");
  out = out.replace(/<p>(\s|&nbsp;|<br\s*\/?>)*<\/p>/gi, "");
  // 모든 img에 referrerpolicy/lazy 부착
  out = out.replace(/<img\b([^>]*)>/gi, (_m, attrs) => {
    let a = attrs;
    if (!/\sloading=/.test(a)) a += ' loading="lazy"';
    if (!/referrerpolicy=/.test(a)) a += ' referrerpolicy="no-referrer"';
    return `<img${a}>`;
  });
  return out;
}

// 일체형 contentEditable에 HTML 삽입 (커서 위치)
function insertAtCursor(html) {
  $("#rich-editor").focus();
  document.execCommand("insertHTML", false, html);
}

async function uploadImage(file) {
  const buf = await file.arrayBuffer();
  const bytes = new Uint8Array(buf);
  let bin = "";
  const CHUNK = 0x8000;
  for (let i = 0; i < bytes.length; i += CHUNK) {
    bin += String.fromCharCode.apply(null, bytes.subarray(i, i + CHUNK));
  }
  const base64 = btoa(bin);
  const res = await api("/api/upload", {
    method: "POST",
    body: JSON.stringify({ filename: file.name, base64, mimeType: file.type }),
  });
  return res.url;
}

function pickAndUploadImage() {
  const inp = document.createElement("input");
  inp.type = "file"; inp.accept = "image/*";
  inp.onchange = async () => {
    const file = inp.files?.[0];
    if (!file) return;
    toast("업로드 중…");
    try {
      const url = await uploadImage(file);
      insertAtCursor(`<figure><img src="${url}" alt=""></figure><p><br></p>`);
      toast("사진이 추가되었습니다");
    } catch (e) { toast(e.message, "error"); }
  };
  inp.click();
}

function promptVideoInsert() {
  const url = prompt("YouTube 또는 Vimeo URL을 붙여넣으세요:");
  if (!url) return;
  const yt = url.match(/(?:youtube\.com\/(?:watch\?v=|embed\/|shorts\/)|youtu\.be\/)([\w-]{11})/);
  const vm = url.match(/vimeo\.com\/(?:video\/)?(\d+)/);
  let embed;
  if (yt) embed = `<iframe src="https://www.youtube.com/embed/${yt[1]}" frameborder="0" allowfullscreen></iframe>`;
  else if (vm) embed = `<iframe src="https://player.vimeo.com/video/${vm[1]}" frameborder="0" allowfullscreen></iframe>`;
  else { toast("YouTube 또는 Vimeo URL을 인식할 수 없습니다", "error"); return; }
  insertAtCursor(`<figure class="cms-video">${embed}</figure><p><br></p>`);
}

// ── 저장 / 발행 ──────────────────────────────────────────────────────────────
function gatherInput() {
  const title = $("#f-title").value.trim();
  if (!title) { toast("제목을 입력하세요", "error"); return null; }
  const body = cleanForSave($("#rich-editor").innerHTML);
  return {
    title,
    addDate: isoToAddDate($("#f-date").value),
    category: $("#f-category").value,
    excerpt: $("#f-excerpt").value.trim(),
    body,
  };
}

function setSaveIndicator(text, kind = "") {
  const el = $("#save-indicator");
  if (!el) return;
  el.className = "save-indicator " + kind;
  el.textContent = text;
}

async function save({ publish = false } = {}) {
  const input = gatherInput();
  if (!input) return null;
  const saveBtn = $("#btn-save"), pubBtn = $("#btn-publish");
  saveBtn.disabled = true; pubBtn.disabled = true;
  setSaveIndicator(publish ? "발행 준비 중…" : "저장 중…");
  try {
    let saved;
    if (state.editing?.logNo) {
      saved = await api(`/api/posts/${state.editing.logNo}`, {
        method: "PUT", body: JSON.stringify(input),
      });
    } else {
      saved = await api("/api/posts", {
        method: "POST", body: JSON.stringify(input),
      });
    }
    setSaveIndicator("저장됨", "saved");
    if (publish) {
      toast("발행 시작 — 사이트 반영까지 약 2~3분");
      await triggerDeploy();
    } else {
      toast("저장되었습니다 (사이트엔 아직 반영 안 됨)");
    }
    await loadPosts();
    if (publish) showList();
    // editing 객체에 새로 저장된 logNo를 반영 (신규 글이었을 경우)
    if (saved?.logNo && !state.editing) state.editing = { logNo: saved.logNo };
    return saved;
  } catch (e) {
    setSaveIndicator("저장 실패", "");
    toast(e.message, "error");
  } finally {
    saveBtn.disabled = false; pubBtn.disabled = false;
  }
}

async function triggerDeploy() {
  const prog = $("#progress");
  prog.classList.add("open");
  $("#prog-title").textContent = "발행 중…";
  $("#prog-step").textContent = "빌드 시작";
  $("#prog-bar").style.width = "10%";
  try {
    const res = await api("/api/deploy", { method: "POST" });
    if (!res.buildId) throw new Error("buildId 없음");
    let n = 0;
    const phaseStep = { SUBMITTED: 12, QUEUED: 20, PROVISIONING: 30, DOWNLOAD_SOURCE: 40, INSTALL: 55, PRE_BUILD: 65, BUILD: 80, POST_BUILD: 92, COMPLETED: 100 };
    while (n < 60) {
      await new Promise((r) => setTimeout(r, 5000));
      const s = await api(`/api/builds/${encodeURIComponent(res.buildId)}`);
      const pct = phaseStep[s.currentPhase] || 50;
      $("#prog-bar").style.width = pct + "%";
      $("#prog-step").textContent = `${s.currentPhase || s.status} (${s.status})`;
      if (s.status === "SUCCEEDED") {
        $("#prog-bar").style.width = "100%";
        $("#prog-title").textContent = "발행 완료";
        $("#prog-step").textContent = "사이트가 갱신되었습니다";
        setTimeout(() => prog.classList.remove("open"), 4000);
        return;
      }
      if (s.status === "FAILED" || s.status === "STOPPED" || s.status === "FAULT" || s.status === "TIMED_OUT") {
        $("#prog-title").textContent = "발행 실패";
        $("#prog-step").textContent = s.status;
        return;
      }
      n++;
    }
    $("#prog-step").textContent = "타임아웃 — CodeBuild 콘솔에서 확인";
  } catch (e) {
    $("#prog-title").textContent = "발행 실패";
    $("#prog-step").textContent = e.message;
  }
}

async function remove(logNo) {
  if (!confirm("이 글을 삭제할까요? 되돌릴 수 없습니다.")) return;
  try {
    await api(`/api/posts/${logNo}`, { method: "DELETE" });
    toast("삭제되었습니다");
    await loadPosts();
    showList();
  } catch (e) { toast(e.message, "error"); }
}

// ── 모달: 카테고리 ──────────────────────────────────────────────────────────
async function openCats() {
  // 카테고리 누락 방지 — 모달 열기 직전 항상 최신으로 동기화
  try {
    const cats = await apiPublic("/api/categories");
    if (Array.isArray(cats.categories)) state.categories = cats.categories;
    fillCategoryUI();
  } catch (e) { toast("카테고리 로딩 실패: " + e.message, "error"); return; }
  renderCatsList();
  $("#modal-cats").classList.add("open");
}
function closeCats() { $("#modal-cats").classList.remove("open"); }
function renderCatsList() {
  $("#cats-list").innerHTML = state.categories.map((c, i) => `
    <div class="row-cat">
      <span class="name">${escapeHtml(c)}</span>
      <button class="tiny ghost" data-cat-up="${i}" ${i===0?"disabled":""}>↑</button>
      <button class="tiny ghost" data-cat-down="${i}" ${i===state.categories.length-1?"disabled":""}>↓</button>
      <button class="tiny danger" data-cat-rm="${i}">삭제</button>
    </div>`).join("");
}
async function saveCats() {
  try {
    const res = await api("/api/categories", {
      method: "PUT", body: JSON.stringify({ categories: state.categories }),
    });
    state.categories = res.categories;
    fillCategoryUI();
    toast("카테고리가 저장되었습니다");
    closeCats();
  } catch (e) { toast(e.message, "error"); }
}

// ── 모달: 설정 ──────────────────────────────────────────────────────────────
function openSettings(force = false) {
  $("#s-url").value = cfg.url;
  $("#s-user").value = cfg.user;
  $("#s-pass").value = cfg.pass;
  $("#modal-settings").classList.add("open");
  // 첫 로그인(force) vs 이미 로그인된 후 설정 변경 — 모달 텍스트도 바꿈
  $("#settings-title").textContent = force ? "관리자 로그인" : "연결 설정";
  $("#settings-help").style.display = force ? "" : "none";
  $("#btn-settings-save").textContent = force ? "로그인" : "저장";
  $("#btn-settings-close").style.display = force ? "none" : "";
  // 고급 설정은 비밀번호 변경 시점엔 펼쳐두기
  $("#advanced-settings").open = !force;
  setTimeout(() => $("#s-pass").focus(), 50);
}
function closeSettings() {
  $("#modal-settings").classList.remove("open");
  $("#btn-settings-close").style.display = "";
}

// ── 이벤트 바인딩 ───────────────────────────────────────────────────────────
$("#q").addEventListener("input", (e) => { state.q = e.target.value; state.page = 0; renderList(); });
$("#cat-filter").addEventListener("change", (e) => { state.cat = e.target.value; state.page = 0; renderList(); });
$("#prev").addEventListener("click", () => { if (state.page > 0) { state.page--; renderList(); } });
$("#next").addEventListener("click", () => { state.page++; renderList(); });

$("#btn-new").addEventListener("click", () => showEditor(null));
$("#btn-back").addEventListener("click", showList);
$("#btn-cancel").addEventListener("click", showList);
$("#btn-save").addEventListener("click", () => save({ publish: false }));
$("#btn-publish").addEventListener("click", () => save({ publish: true }));
$("#btn-delete").addEventListener("click", () => state.editing && remove(state.editing.logNo));

$("#rows").addEventListener("click", async (e) => {
  const row = e.target.closest(".row[data-logno]");
  if (!row) return;
  const logNo = row.dataset.logno;
  const act = e.target.dataset.act;
  if (act === "edit") {
    try { showEditor(await api(`/api/posts/${logNo}`)); }
    catch (err) { toast(err.message, "error"); }
  } else if (act === "delete") {
    remove(logNo);
  }
});

// 일체형 에디터 — 툴바 버튼
$("#rich-toolbar").addEventListener("click", (e) => {
  const btn = e.target.closest("button[data-rt]");
  if (!btn) return;
  const cmd = btn.dataset.rt;
  $("#rich-editor").focus();
  if (cmd === "bold") document.execCommand("bold");
  else if (cmd === "heading") insertAtCursor("<h2>소제목</h2><p><br></p>");
  else if (cmd === "quote") insertAtCursor("<blockquote>인용할 문장을 입력하세요</blockquote><p><br></p>");
  else if (cmd === "hr") insertAtCursor("<hr><p><br></p>");
  else if (cmd === "image") pickAndUploadImage();
  else if (cmd === "video") promptVideoInsert();
});

// 에디터에 이미지 드래그&드롭으로 추가
const richEd = $("#rich-editor");
richEd.addEventListener("dragover", (e) => { e.preventDefault(); });
richEd.addEventListener("drop", async (e) => {
  const file = e.dataTransfer?.files?.[0];
  if (!file || !file.type.startsWith("image/")) return;
  e.preventDefault();
  toast("업로드 중…");
  try {
    const url = await uploadImage(file);
    insertAtCursor(`<figure><img src="${url}" alt=""></figure><p><br></p>`);
    toast("사진이 추가되었습니다");
  } catch (err) { toast(err.message, "error"); }
});

// 에디터 이미지 클릭 → 떠 있는 [변경 / 설명 / 삭제] 메뉴
let selectedFigure = null;
const imgOverlay = $("#img-overlay");

function showImgOverlay(fig) {
  // 기존 선택 해제
  document.querySelectorAll(".rich-editor figure.selected").forEach(f => f.classList.remove("selected"));
  fig.classList.add("selected");
  selectedFigure = fig;
  // 위치: figure의 우상단
  const rect = fig.getBoundingClientRect();
  imgOverlay.style.top = (window.scrollY + rect.top - 44) + "px";
  imgOverlay.style.left = (window.scrollX + rect.right - imgOverlay.offsetWidth) + "px";
  imgOverlay.classList.add("show");
}
function hideImgOverlay() {
  imgOverlay.classList.remove("show");
  document.querySelectorAll(".rich-editor figure.selected").forEach(f => f.classList.remove("selected"));
  selectedFigure = null;
}

richEd.addEventListener("click", (e) => {
  const fig = e.target.closest("figure");
  if (fig && richEd.contains(fig)) {
    e.preventDefault();
    showImgOverlay(fig);
  } else {
    hideImgOverlay();
  }
});
document.addEventListener("scroll", () => {
  if (selectedFigure) showImgOverlay(selectedFigure);
}, { passive: true });

imgOverlay.addEventListener("click", (e) => {
  const btn = e.target.closest("button[data-img-act]");
  if (!btn || !selectedFigure) return;
  const act = btn.dataset.imgAct;
  const fig = selectedFigure;
  if (act === "replace") {
    const img = fig.querySelector("img");
    if (!img) return;
    const inp = document.createElement("input");
    inp.type = "file"; inp.accept = "image/*";
    inp.onchange = async () => {
      const file = inp.files?.[0];
      if (!file) return;
      toast("업로드 중…");
      try {
        const url = await uploadImage(file);
        img.src = url;
        toast("사진이 변경되었습니다");
      } catch (err) { toast(err.message, "error"); }
    };
    inp.click();
  } else if (act === "caption") {
    let cap = fig.querySelector("figcaption");
    if (!cap) {
      cap = document.createElement("figcaption");
      cap.textContent = "사진 설명을 입력하세요";
      fig.appendChild(cap);
    }
    cap.contentEditable = "true";
    cap.focus();
    // 전체 선택
    const range = document.createRange();
    range.selectNodeContents(cap);
    const sel = window.getSelection();
    sel.removeAllRanges();
    sel.addRange(range);
  } else if (act === "delete") {
    fig.remove();
    hideImgOverlay();
  }
});

// 카테고리 모달
$("#btn-cats").addEventListener("click", openCats);
$("#btn-cats-close").addEventListener("click", closeCats);
$("#btn-cats-save").addEventListener("click", saveCats);
$("#btn-add-cat").addEventListener("click", () => {
  const v = $("#new-cat").value.trim();
  if (v && !state.categories.includes(v)) {
    state.categories.push(v);
    $("#new-cat").value = "";
    renderCatsList();
  }
});
$("#cats-list").addEventListener("click", (e) => {
  const rm = e.target.dataset.catRm;
  const up = e.target.dataset.catUp;
  const dn = e.target.dataset.catDown;
  if (rm !== undefined) {
    state.categories.splice(Number(rm), 1);
    renderCatsList();
  } else if (up !== undefined) {
    const i = Number(up);
    [state.categories[i-1], state.categories[i]] = [state.categories[i], state.categories[i-1]];
    renderCatsList();
  } else if (dn !== undefined) {
    const i = Number(dn);
    [state.categories[i+1], state.categories[i]] = [state.categories[i], state.categories[i+1]];
    renderCatsList();
  }
});

// 설정 모달
$("#btn-settings").addEventListener("click", () => openSettings(false));
$("#btn-settings-close").addEventListener("click", closeSettings);
// 비밀번호 입력란에서 Enter로 저장
document.addEventListener("keydown", (e) => {
  if (e.key === "Enter" && $("#modal-settings").classList.contains("open")
      && (e.target.id === "s-pass" || e.target.id === "s-user")) {
    e.preventDefault();
    $("#btn-settings-save").click();
  }
});
$("#btn-settings-save").addEventListener("click", () => {
  cfg.url = $("#s-url").value.trim().replace(/\/$/, "");
  cfg.user = $("#s-user").value.trim() || "admin";
  cfg.pass = $("#s-pass").value;
  localStorage.setItem("cms_url", cfg.url);
  localStorage.setItem("cms_user", cfg.user);
  localStorage.setItem("cms_pass", cfg.pass);
  closeSettings();
  boot();
});

// 모달 배경 클릭으로 닫기 (단, 설정이 강제 모드일 때는 닫히지 않음)
$("#modal-cats").addEventListener("click", (e) => {
  if (e.target === $("#modal-cats")) $("#modal-cats").classList.remove("open");
});
$("#modal-settings").addEventListener("click", (e) => {
  if (e.target !== $("#modal-settings")) return;
  // 강제 모드(첫 진입 비번 미설정)에서는 배경 클릭으로 닫지 않음
  const closeBtn = $("#btn-settings-close");
  if (closeBtn && closeBtn.style.display === "none") return;
  $("#modal-settings").classList.remove("open");
});

boot();
</script>
